<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lectura de Mercado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--gold:#C9A84C;--gold-dim:#8a6e2f;--dark:#0a0a0a;--dark-2:#111111;--dark-3:#1a1a1a;--dark-4:#222222;--text:#e8e0d0;--text-dim:#8a8070;--red:#c0392b;--green:#27ae60;--radius:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
.screen{display:none;min-height:100vh}
.screen.active{display:flex}
#loginScreen{align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a 0%,#111111 50%,#0a0a0a 100%)}
.login-box{background:var(--dark-3);border:1px solid var(--gold-dim);border-radius:16px;padding:48px 40px;width:100%;max-width:400px;text-align:center}
.login-logo{font-size:2.5rem;margin-bottom:8px}
.login-title{font-size:1.6rem;font-weight:700;color:var(--gold);margin-bottom:4px}
.login-sub{color:var(--text-dim);font-size:.9rem;margin-bottom:32px}
.form-group{margin-bottom:16px;position:relative;text-align:left}
.form-group label{display:block;color:var(--text-dim);font-size:.85rem;margin-bottom:6px}
.form-group input{width:100%;background:var(--dark-4);border:1px solid #333;border-radius:var(--radius);padding:12px 40px 12px 14px;color:var(--text);font-size:.95rem;outline:none;transition:border .2s}
.form-group input:focus{border-color:var(--gold)}
.eye-toggle{position:absolute;right:12px;bottom:12px;cursor:pointer;color:var(--text-dim);font-size:1.1rem;user-select:none}
.btn-login{width:100%;background:var(--gold);color:#000;border:none;border-radius:var(--radius);padding:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s}
.btn-login:hover{background:var(--gold-dim)}
.login-error{color:var(--red);font-size:.85rem;margin-top:12px;min-height:20px}
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:var(--dark-2);border-bottom:1px solid var(--gold-dim);display:flex;align-items:center;padding:0 20px;z-index:100;gap:12px}
.topbar-logo{font-size:1.2rem;font-weight:700;color:var(--gold);flex:1}
.topbar-user{font-size:.85rem;color:var(--text-dim)}
.topbar-expiry{font-size:.8rem;padding:4px 10px;border-radius:20px;background:#1a1a0a;border:1px solid var(--gold-dim);color:var(--gold)}
.topbar-expiry.urgent{background:#1a0a0a;border-color:var(--red);color:var(--red)}
.btn-admin-panel{background:var(--gold);color:#000;border:none;border-radius:var(--radius);padding:6px 14px;font-size:.8rem;font-weight:700;cursor:pointer}
.btn-market{background:transparent;border:1px solid var(--gold);color:var(--gold);border-radius:var(--radius);padding:6px 14px;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-market:hover,.btn-market.active{background:var(--gold);color:#000}
.btn-logout{background:transparent;border:1px solid #444;border-radius:var(--radius);padding:6px 14px;color:var(--text-dim);font-size:.8rem;cursor:pointer}
.btn-logout:hover{border-color:var(--gold);color:var(--gold)}
.btn-back{background:transparent;border:1px solid #444;color:var(--text-dim);border-radius:var(--radius);padding:6px 14px;cursor:pointer;font-size:.8rem}
.btn-back:hover{border-color:var(--gold);color:var(--gold)}
#appScreen{flex-direction:column}
.app-content{margin-top:56px;padding:30px 20px;max-width:900px;width:100%;margin-left:auto;margin-right:auto}
.app-title{font-size:1.8rem;font-weight:700;color:var(--gold);margin-bottom:6px}
.app-sub{color:var(--text-dim);margin-bottom:28px}
.config-card{background:var(--dark-3);border:1px solid #333;border-radius:12px;padding:24px;margin-bottom:20px}
.config-card h3{color:var(--gold);margin-bottom:16px;font-size:1rem}
.selects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.select-group label{display:block;color:var(--text-dim);font-size:.8rem;margin-bottom:5px}
select{width:100%;background:var(--dark-4);border:1px solid #333;border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:.9rem;outline:none}
select:focus{border-color:var(--gold)}
.btn-analyze{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#000;border:none;border-radius:var(--radius);padding:14px 32px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;margin-top:16px;transition:opacity .2s}
.btn-analyze:hover{opacity:.85}
.btn-analyze:disabled{opacity:.5;cursor:not-allowed}
#emailGate{background:var(--dark-3);border:1px solid var(--gold-dim);border-radius:12px;padding:32px;text-align:center;margin-top:20px;display:none}
#emailGate h3{color:var(--gold);margin-bottom:8px}
#emailGate p{color:var(--text-dim);margin-bottom:20px;font-size:.9rem}
.email-input-row{display:flex;gap:10px;max-width:400px;margin:0 auto}
.email-input-row input{flex:1;background:var(--dark-4);border:1px solid #333;border-radius:var(--radius);padding:11px 14px;color:var(--text);font-size:.9rem;outline:none}
.email-input-row input:focus{border-color:var(--gold)}
.btn-unlock{background:var(--gold);color:#000;border:none;border-radius:var(--radius);padding:11px 20px;font-weight:700;cursor:pointer;white-space:nowrap}
#resultsSection{margin-top:24px;display:none}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.results-header h2{color:var(--gold)}
.btn-pdf{background:transparent;border:1px solid var(--gold);color:var(--gold);border-radius:var(--radius);padding:8px 18px;cursor:pointer;font-size:.85rem}
.btn-pdf:hover{background:var(--gold);color:#000}
.products-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.product-card{background:var(--dark-3);border:1px solid #333;border-radius:12px;padding:20px;position:relative}
.product-card.top-pick{border-color:var(--gold)}
.top-badge{position:absolute;top:12px;right:12px;background:var(--gold);color:#000;font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:4px}
.product-name{font-size:1.1rem;font-weight:700;margin-bottom:12px}
.score-bar{background:#222;border-radius:4px;height:8px;margin-bottom:12px}
.score-fill{height:8px;border-radius:4px;background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
.product-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat{background:var(--dark-4);border-radius:6px;padding:8px}
.stat-label{font-size:.7rem;color:var(--text-dim)}
.stat-value{font-size:.95rem;font-weight:600;color:var(--gold)}
.product-justification{margin-top:12px;font-size:.82rem;color:var(--text-dim);line-height:1.5}
.chat-section{margin-top:24px}
.chat-section h3{color:var(--gold);margin-bottom:12px}
.chat-box{background:var(--dark-3);border:1px solid #333;border-radius:12px;padding:16px;height:300px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:80%;padding:10px 14px;border-radius:10px;font-size:.88rem;line-height:1.5}
.msg.user{background:var(--gold-dim);color:#fff;align-self:flex-end;border-bottom-right-radius:2px}
.msg.bot{background:var(--dark-4);color:var(--text);align-self:flex-start;border-bottom-left-radius:2px}
.chat-input-row{display:flex;gap:10px}
.chat-input-row input{flex:1;background:var(--dark-4);border:1px solid #333;border-radius:var(--radius);padding:11px 14px;color:var(--text);font-size:.9rem;outline:none}
.chat-input-row input:focus{border-color:var(--gold)}
.btn-send{background:var(--gold);color:#000;border:none;border-radius:var(--radius);padding:11px 18px;font-weight:700;cursor:pointer}
.contact-section{background:var(--dark-3);border:1px solid #333;border-radius:12px;padding:24px;margin-top:24px;text-align:center}
.contact-section h3{color:var(--gold);margin-bottom:8px}
.contact-section p{color:var(--text-dim);margin-bottom:16px;font-size:.9rem}
.contact-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-wa{background:#25D366;color:#fff;border:none;border-radius:var(--radius);padding:11px 22px;font-weight:700;cursor:pointer;text-decoration:none;font-size:.9rem;display:inline-block}
.btn-is{background:transparent;border:1px solid var(--gold);color:var(--gold);border-radius:var(--radius);padding:11px 22px;font-weight:700;cursor:pointer;text-decoration:none;font-size:.9rem;display:inline-block}
#adminScreen{flex-direction:column}
.admin-content{margin-top:56px;padding:30px 20px;max-width:1000px;width:100%;margin-left:auto;margin-right:auto}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.admin-header h2{color:var(--gold);font-size:1.6rem}
.admin-section{background:var(--dark-3);border:1px solid #333;border-radius:12px;padding:24px;margin-bottom:24px}
.admin-section h3{color:var(--gold);margin-bottom:16px;font-size:1rem;border-bottom:1px solid #333;padding-bottom:8px}
.create-user-form{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end}
.form-field label{display:block;color:var(--text-dim);font-size:.8rem;margin-bottom:5px}
.form-field input,.form-field select{width:100%;background:var(--dark-4);border:1px solid #333;border-radius:var(--radius);padding:13px 16px;color:var(--text);font-size:1rem;outline:none}
.form-field input:focus,.form-field select:focus{border-color:var(--gold)}
.btn-create{background:var(--gold);color:#000;border:none;border-radius:var(--radius);padding:13px 24px;font-weight:700;cursor:pointer;white-space:nowrap;font-size:1rem;letter-spacing:.03em}
.users-table{width:100%;border-collapse:collapse}
.users-table th{background:var(--dark-4);color:var(--text-dim);font-size:.8rem;text-align:left;padding:10px 12px;border-bottom:1px solid #333}
.users-table td{padding:10px 12px;border-bottom:1px solid #2a2a2a;font-size:.88rem}
.users-table tr:hover td{background:rgba(201,168,76,.05)}
.badge{padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge.active{background:rgba(39,174,96,.15);color:var(--green)}
.badge.inactive{background:rgba(192,57,43,.15);color:var(--red)}
.badge.expired{background:rgba(192,57,43,.2);color:var(--red)}
.badge.admin{background:rgba(201,168,76,.15);color:var(--gold)}
.btn-sm{border:none;border-radius:4px;padding:5px 11px;font-size:.78rem;cursor:pointer;font-weight:600}
.btn-toggle{background:rgba(39,174,96,.15);color:var(--green)}
.btn-toggle.deactivate{background:rgba(192,57,43,.15);color:var(--red)}
.btn-delete{background:rgba(192,57,43,.15);color:var(--red);margin-left:6px}
.btn-sm:hover{opacity:.75}
.admin-msg{padding:10px;border-radius:var(--radius);margin-bottom:12px;font-size:.88rem;display:none}
.admin-msg.ok{background:rgba(39,174,96,.15);color:var(--green);border:1px solid var(--green);display:block}
.admin-msg.err{background:rgba(192,57,43,.15);color:var(--red);border:1px solid var(--red);display:block}
.loading{text-align:center;color:var(--text-dim);padding:20px}
#marketScreen{flex-direction:column}
.market-content{margin-top:56px;padding:30px 20px;max-width:860px;width:100%;margin-left:auto;margin-right:auto}
.market-title{font-size:1.8rem;font-weight:700;color:var(--gold);margin-bottom:6px}
.market-sub{color:var(--text-dim);margin-bottom:28px;font-size:.95rem}
.mr-search-box{background:var(--dark-3);border:1px solid #333;border-radius:12px;padding:24px;margin-bottom:20px}
.mr-search-row{display:flex;gap:10px;margin-bottom:16px}
.mr-search-row input{flex:1;background:var(--dark-4);border:1px solid #333;border-radius:var(--radius);padding:16px 20px;color:var(--text);font-size:1.1rem;outline:none}
.mr-search-row input:focus{border-color:var(--gold)}
.btn-mr-analyze{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#000;border:none;border-radius:var(--radius);padding:16px 30px;font-size:1.05rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.btn-mr-analyze:disabled{opacity:.5;cursor:not-allowed}
.mr-params{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.mr-param label{display:block;color:var(--text-dim);font-size:.75rem;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.mr-param select,.mr-param input{width:100%;background:var(--dark-4);border:1px solid #333;border-radius:var(--radius);padding:9px 12px;color:var(--text);font-size:.88rem;outline:none}
.mr-param select:focus,.mr-param input:focus{border-color:var(--gold)}
.mr-steps{display:none}
.mr-steps.visible{display:block}
.mr-step{background:var(--dark-3);border:1px solid #2a2a2a;border-radius:12px;padding:20px;margin-bottom:14px;transition:border-color .3s}
.mr-step.active{border-color:var(--gold-dim)}
.mr-step-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.mr-step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.num-auto{background:rgba(39,174,96,.2);color:var(--green);border:1px solid rgba(39,174,96,.3)}
.num-guided{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid var(--gold-dim)}
.mr-step-title{font-size:.95rem;font-weight:700;flex:1}
.mr-badge{font-size:.7rem;padding:3px 10px;border-radius:20px;font-weight:600}
.badge-auto{background:rgba(39,174,96,.15);color:var(--green);border:1px solid rgba(39,174,96,.3)}
.badge-guided{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid var(--gold-dim)}
.mr-step-body{font-size:.88rem;color:var(--text-dim);line-height:1.6}
.mr-loading{display:flex;align-items:center;gap:10px;color:var(--text-dim);font-size:.88rem}
.dot-anim{display:flex;gap:4px}
.dot-anim span{width:6px;height:6px;border-radius:50%;background:var(--gold-dim);animation:dotB 1.2s infinite}
.dot-anim span:nth-child(2){animation-delay:.2s}
.dot-anim span:nth-child(3){animation-delay:.4s}
@keyframes dotB{0%,80%,100%{opacity:.3}40%{opacity:1}}
.mr-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #2a2a2a}
.mr-row:last-child{border-bottom:none}
.mr-row-label{font-size:.82rem;color:var(--text-dim)}
.mr-row-value{font-size:.85rem;font-weight:600;color:var(--text)}
.mr-instruction{background:rgba(201,168,76,.07);border:1px solid var(--gold-dim);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;font-size:.83rem;color:var(--text);line-height:1.6}
.mr-instruction strong{display:block;color:var(--gold);margin-bottom:4px;font-size:.85rem}
.mr-guided-grid{display:grid;gap:10px;margin-bottom:12px}
.mr-field label{display:block;font-size:.78rem;color:var(--text-dim);margin-bottom:4px}
.mr-field input,.mr-field select{width:100%;background:var(--dark-4);border:1px solid #333;border-radius:var(--radius);padding:9px 12px;color:var(--text);font-size:.9rem;outline:none}
.mr-field input:focus,.mr-field select:focus{border-color:var(--gold)}
.btn-confirm{background:var(--gold);color:#000;border:none;border-radius:var(--radius);padding:10px 20px;font-size:.88rem;font-weight:700;cursor:pointer;margin-top:4px}
.mr-tag{display:inline-block;font-size:.72rem;padding:3px 9px;border-radius:20px;margin:2px 2px 0 0;font-weight:600}
.tag-ok{background:rgba(39,174,96,.15);color:var(--green);border:1px solid rgba(39,174,96,.3)}
.tag-warn{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid var(--gold-dim)}
.tag-bad{background:rgba(192,57,43,.15);color:var(--red);border:1px solid rgba(192,57,43,.3)}
.tag-info{background:rgba(255,255,255,.07);color:var(--text-dim);border:1px solid #333}
.mr-result{background:var(--dark-3);border:1px solid #2a2a2a;border-radius:12px;padding:28px;margin-top:8px;display:none}
.mr-result.visible{display:block}
.mr-result h2{color:var(--gold);font-size:1.2rem;margin-bottom:24px}
.mr-veredicto{border-radius:var(--radius);padding:16px 18px;margin-bottom:24px}
.mv-si{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.4)}
.mv-cond{background:rgba(201,168,76,.08);border:1px solid var(--gold-dim)}
.mv-no{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.4)}
.mv-title{font-size:1rem;font-weight:700;margin-bottom:6px}
.mv-text{font-size:.85rem;color:var(--text-dim);line-height:1.6}
.mr-charts-top{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.mr-chart-box{background:var(--dark-4);border-radius:12px;padding:20px}
.mr-chart-box h4{color:var(--gold);font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.gauge-wrap{position:relative;width:180px;margin:0 auto}
.gauge-label{text-align:center;font-size:.82rem;color:var(--text-dim);margin-top:6px}
.mr-factor-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.mfc{background:var(--dark-4);border-radius:12px;padding:16px;border-left:3px solid transparent;transition:border-color .3s}
.mfc.verde{border-left-color:#27ae60}
.mfc.amarillo{border-left-color:#C9A84C}
.mfc.rojo{border-left-color:#c0392b}
.mfc-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mfc-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.mfc-icon.verde{background:rgba(39,174,96,.15)}
.mfc-icon.amarillo{background:rgba(201,168,76,.1)}
.mfc-icon.rojo{background:rgba(192,57,43,.12)}
.mfc-name{font-size:.78rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em}
.mfc-score{font-size:1.6rem;font-weight:700;margin-bottom:4px}
.mfc-score.verde{color:#27ae60}
.mfc-score.amarillo{color:#C9A84C}
.mfc-score.rojo{color:#c0392b}
.mfc-bar-bg{height:5px;background:#2a2a2a;border-radius:3px;margin-bottom:6px}
.mfc-bar-fill{height:5px;border-radius:3px;transition:width 1s ease}
.mfc-label{font-size:.78rem;color:var(--text-dim)}
.semaforo{display:flex;gap:5px;margin-top:8px}
.sem-dot{width:10px;height:10px;border-radius:50%;background:#2a2a2a;transition:background .4s}
.sem-dot.on-verde{background:#27ae60}
.sem-dot.on-amarillo{background:#C9A84C}
.sem-dot.on-rojo{background:#c0392b}
.mr-charts-bottom{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.mr-analysis{font-size:.85rem;color:var(--text-dim);line-height:1.75;white-space:pre-wrap;border-top:1px solid #2a2a2a;padding-top:16px;margin-top:4px}
.mr-action-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn-outline-gold{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);border-radius:var(--radius);padding:9px 18px;font-size:.85rem;cursor:pointer;font-weight:600}
.btn-outline-gold:hover{background:var(--gold);color:#000}
.btn-outline-dim{background:transparent;border:1px solid #444;color:var(--text-dim);border-radius:var(--radius);padding:9px 18px;font-size:.85rem;cursor:pointer}
.btn-outline-dim:hover{border-color:var(--gold);color:var(--gold)}
.mr-comp-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:.82rem}
.mr-comp-table th{background:var(--dark-4);color:var(--text-dim);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;padding:7px 10px;border-bottom:1px solid #333;text-align:left}
.mr-comp-table td{padding:8px 10px;border-bottom:1px solid #2a2a2a;vertical-align:middle}
.mr-comp-table tr:last-child td{border-bottom:none}
.mr-comp-table tr:hover td{background:rgba(201,168,76,.04)}
.comp-rank{font-weight:700;color:var(--gold);font-size:.78rem;width:28px}
.comp-name{font-size:.83rem;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.comp-price{font-weight:600;color:var(--text);white-space:nowrap}
.comp-sales{color:var(--green);font-weight:600;white-space:nowrap}
.comp-rep{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.7rem;font-weight:600}
.rep-gold{background:rgba(201,168,76,.2);color:var(--gold)}
.rep-green{background:rgba(39,174,96,.2);color:var(--green)}
.rep-red{background:rgba(192,57,43,.2);color:var(--red)}
.rep-silver{background:rgba(255,255,255,.08);color:var(--text-dim)}
.waterfall-wrap{background:var(--dark-4);border-radius:12px;padding:20px;margin-top:16px}
.waterfall-wrap h4{color:var(--gold);font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.wf-row{display:flex;align-items:center;margin-bottom:8px;gap:0}
.wf-label{font-size:.75rem;color:var(--text-dim);white-space:nowrap;min-width:180px}
.wf-bar-bg{flex:1;height:18px;background:#2a2a2a;border-radius:3px;position:relative;overflow:hidden;min-width:80px}
.wf-bar-fill{height:100%;border-radius:3px;transition:width .8s ease;min-width:2px}
.wf-bar-fill.pos{background:linear-gradient(90deg,#27ae60,#2ecc71)}
.wf-bar-fill.neg{background:linear-gradient(90deg,#c0392b,#e74c3c)}
.wf-bar-fill.
