<div class="mr-step-body" id="mrStep4Body">
  <div class="mr-instruction">
    <strong>🛒 Tres cosas para buscar:</strong>
    <strong style="color:var(--text);margin-top:8px;display:block">FOB en Alibaba/1688:</strong>
    Precio unitario para tu cantidad de compra.<br>
    <strong style="color:var(--text)">Peso y volumen:</strong>
    Peso unitario en kg (impacta flete).<br>
    <strong style="color:var(--text)">Ventas MeLi:</strong>
    Entrá a los 3 primeros listings y estimá ventas/mes promedio.
  </div>
  <div class="mr-guided-grid" style="grid-template-columns:1fr 1fr;gap:10px">
    <div class="mr-field"><label>Precio FOB (USD/unidad)</label>
      <input type="number" id="mrFOB" placeholder="Ej: 2.50" step="0.01" min="0"/></div>
    <div class="mr-field"><label>Peso unitario (kg)</label>
      <input type="number" id="mrPeso" placeholder="Ej: 0.3" step="0.01" min="0"/></div>
    <div class="mr-field"><label>Precio venta MeLi (ARS, opcional — si lo dejás vacío usa el promedio real)</label>
      <input type="number" id="mrPrecioVenta" placeholder="Auto desde step 2" min="0"/></div>
    <div class="mr-field"><label>Ventas/mes top 3 listings</label>
      <input type="number" id="mrVentas" placeholder="Ej: 150" min="0"/></div>
    <div class="mr-field"><label>Categoría MeLi (comisión)</label>
      <select id="mrCategoria">
        <option value="0.13">Mascotas / Hogar (13%)</option>
        <option value="0.14">Electrónica / Gadgets (14%)</option>
        <option value="0.145">Moda / Deportes (14,5%)</option>
        <option value="0.16">Bebés / Juguetes (16%)</option>
        <option value="0.165">Premium todas las categorías (16,5%)</option>
      </select></div>
    <div class="mr-field"><label>Modalidad envío</label>
      <select id="mrEnvio">
        <option value="full">Mercado Envíos Full (+10%)</option>
        <option value="flex">Flex / Colecta (+3%)</option>
        <option value="agencia">Agencia / Correo propio (+0%)</option>
      </select></div>
    <div class="mr-field"><label>Condición fiscal</label>
      <select id="mrFiscal">
        <option value="monotributo">Monotributo (sin IVA venta)</option>
        <option value="ri">Responsable Inscripto (21% IVA)</option>
      </select></div>
    <div class="mr-field"><label>IIBB provincia (%)</label>
      <input type="number" id="mrIIBB" value="3" step="0.1" min="0" max="10"/></div>
  </div>
  <button class="btn-confirm" onclick="confirmMRStep4()">Calcular viabilidad completa →</button>
</div>
