<!DOCTYPE html>
  <html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar — InnovasmartMargen</title>
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:48px 40px;width:100%;max-width:420px}
    .logo{font-size:40px;text-align:center;margin-bottom:12px}
    h1{font-size:22px;font-weight:800;color:#FFE600;text-align:center;margin-bottom:6px}
        .sub{color:#555;font-size:14px;text-align:center;margin-bottom:36px}
    .field{margin-bottom:16px}
    label{display:block;font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;font-weight:600}
    input{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:12px 14px;color:#f0f0f0;font-size:15px;outline:none;transition:border-color .15s}
        input:focus{border-color:#FFE600}
              .error{background:#1a0505;border:1px solid #7f1d1d;border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:16px;display:none}
        .btn{width:100%;background:#FFE600;color:#000;font-weight:700;font-size:16px;padding:14px;border-radius:10px;border:none;cursor:pointer;margin-top:8px;transition:opacity .15s}
        .btn:hover{opacity:.9}
              .btn:disabled{opacity:.5;cursor:not-allowed}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid #0005;border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hint{margin-top:20px;font-size:12px;color:#444;text-align:center}
  </style>
      </head>
      <body>
      <div class="card">
  <div class="logo">💰</div>
        <h1>InnovasmartMargen</h1>
        <p class="sub">Ingresá con tu usuario y contraseña</p>

  <div class="error" id="errMsg"></div>

  <div class="field">
    <label>Usuario</label>
    <input type="text" id="user" placeholder="tu_usuario" autocomplete="username">
        </div>
        <div class="field">
    <label>Contraseña</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
  </div>

        <button class="btn" id="loginBtn" onclick="doLogin()">Ingresar</button>

        <p class="hint">¿No tenés acceso? Contactá a tu asesor.</p>
</div>

<script>
  // Si ya esta logueado, redirigir
  const savedUser = localStorage.getItem('pf_user');
  const savedRole = localStorage.getItem('pf_role');
  if (savedUser && savedRole) {
    if (savedRole === 'admin') {
      window.location.replace('/admin.html');
} else {
      checkMeliAndRedirect(savedUser);
}
}

  document.getElementById('pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
});
  document.getElementById('user').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('pass').focus();
});

  async function doLogin() {
    const user = document.getElementById('user').value.trim();
    const pass = document.getElementById('pass').value;
    const errEl = document.getElementById('errMsg');
    const btn = document.getElementById('loginBtn');

    errEl.style.display = 'none';
    if (!user || !pass) {
      errEl.textContent = 'Completá usuario y contraseña';
      errEl.style.display = 'block';
      return;
}

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Ingresando...';

    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: user, password: pass})
});
      const data = await res.json();

      if (!res.ok || !data.success) {
        errEl.textContent = data.error || 'Usuario o contraseña incorrectos';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
        return;
      }

      // Guardar sesion
      localStorage.setItem('pf_user', user);
      localStorage.setItem('pf_role', data.role);
      if (data.expiryDays && data.createdAt) {
        const expiry = new Date(new Date(data.createdAt).getTime() + data.expiryDays * 86400000).toISOString();
        localStorage.setItem('pf_expiry', expiry);
      }

      // Redirigir segun rol
      if (data.role === 'admin') {
        window.location.replace('/admin.html');
      } else {
        await checkMeliAndRedirect(user);
      }

    } catch(e) {
      errEl.textContent = 'Error de conexion. Intentá de nuevo.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  }

  async function checkMeliAndRedirect(userId) {
    try {
      const res = await fetch('/api/meli-check?user_id=' + encodeURIComponent(userId));
      const data = await res.json();
      if (data.connected && !data.needs_reconnect) {
        window.location.replace('/dashboard.html');
      } else {
        window.location.replace('/meli-connect.html');
      }
    } catch {
      window.location.replace('/meli-connect.html');
    }
  }
</script>
  </body>
  </html>
